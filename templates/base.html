<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Gold Price Predictor{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
  <div class="container-xl">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <span class="brand-icon">⚡</span>
      <span>GoldML</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1 align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='index' %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="bi bi-house-door me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='analysis' %}active{% endif %}" href="{{ url_for('analysis') }}">
            <i class="bi bi-bar-chart-line me-1"></i>EDA
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='models' %}active{% endif %}" href="{{ url_for('models') }}">
            <i class="bi bi-cpu me-1"></i>Models
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='insights' %}active{% endif %}" href="{{ url_for('insights') }}">
            <i class="bi bi-lightbulb me-1"></i>Insights
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='compare' %}active{% endif %}" href="{{ url_for('compare') }}">
            <i class="bi bi-arrow-left-right me-1"></i>Compare
          </a>
        </li>
        <li class="nav-item ms-lg-2">
          <a class="nav-link btn btn-gold px-4 {% if request.endpoint=='predict' %}active{% endif %}" href="{{ url_for('predict') }}">
            <i class="bi bi-lightning-fill me-1"></i>Predict
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="footer py-4 mt-5">
  <div class="container-xl text-center">
    <p class="mb-1 small" style="color:rgba(255,255,255,0.4)">
      <strong style="color:rgba(255,255,255,0.7)">GoldML</strong> &nbsp;·&nbsp; Portfolio Data Science Project &nbsp;·&nbsp; Gold Price Prediction
    </p>
    <p class="mb-0 small" style="color:rgba(255,255,255,0.25)">
      Lasso · Random Forest · XGBoost &nbsp;|&nbsp; Python · Scikit-learn · Flask · Bootstrap 5
    </p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
